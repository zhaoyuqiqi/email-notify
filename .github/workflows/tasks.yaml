name: 定时任务集合

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发
  schedule:
    # 任务C：每30分钟
    - cron: '*/30 * * * *'

    # 未来你可以继续加
    # 任务A：每1小时
    # - cron: '0 */1 * * *'
    # 任务B：每6小时
    # - cron: '0 */6 * * *'

jobs:
  # ======================================
  # 任务C：仅在 push 或 每30分钟定时 执行
  # ======================================
  test-cos:
    name: 检查COS是否合法
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || contains(github.event.schedule, '*/30 * * * *')

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: 运行COS检查
        env:
          COS_AUTH_KEY: ${{ secrets.COS_AUTH_KEY }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_RECEIVER: ${{ secrets.MAIL_RECEIVER }}
        run: bun run src/tasks/test-cos.ts

  # ======================================
  # 未来你加任务A（每1小时）就这样写
  # ======================================
  # task-a:
  #   runs-on: ubuntu-latest
  #   if: contains(github.event.schedule, '0 */1 * * *')
  #   steps:
  #     - run: echo "任务A 每1小时执行"

  # ======================================
  # 未来你加任务B（每6小时）就这样写
  # ======================================
  # task-b:
  #   runs-on: ubuntu-latest
  #   if: contains(github.event.schedule, '0 */6 * * *')
  #   steps:
  #     - run: echo "任务B 每6小时执行"